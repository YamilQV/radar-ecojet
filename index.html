<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ecojet Radar PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;background:#0b0f14;color:#e6f1ff;font-family:Consolas;}

header{
background:#111;
padding:10px;
display:flex;
justify-content:space-between;
border-bottom:1px solid #222;
}

button{
margin:3px;
padding:6px 10px;
border-radius:6px;
border:none;
cursor:pointer;
background:#1f2933;
color:#fff;
}

.container{
display:grid;
grid-template-columns:2fr 1fr;
height:calc(100vh - 60px);
}

table{width:100%;border-collapse:collapse;font-size:13px;}
td,th{padding:6px;border-bottom:1px solid #222;text-align:center;}

.time-input{
width:60px;
background:#111;
color:#4db8ff;
border:1px solid #333;
border-radius:4px;
text-align:center;
}

.estado{
padding:4px 8px;
border-radius:6px;
color:#fff;
font-weight:bold;
display:inline-block;
}

.plan{background:#1f8f4d;}
.envuelo{background:#2979ff;}
.arribado{background:#555;}
.demora{background:#ff0000;}

.demora{
animation:blink 0.6s infinite;
}

@keyframes blink{
50%{opacity:0;}
}

.progress{height:8px;background:#1c252e;border-radius:10px;overflow:hidden;}
.progress div{height:100%;background:#4db8ff;}

.map-container{display:flex;flex-direction:column;height:100%;}
.tabs{display:flex;background:#111;}
.tab{flex:1;padding:8px;text-align:center;cursor:pointer;}
.tab.active{background:#222;}

iframe{width:100%;height:100%;border:none;display:none;}
iframe.active{display:block;}

footer{
background:#111;
text-align:center;
padding:6px;
color:#777;
font-size:12px;
}

#modal{
display:none;
position:fixed;
top:25%;
left:40%;
background:#111;
padding:15px;
border-radius:8px;
border:1px solid #333;
}

#modal input{margin:5px;}

</style>
</head>

<body>

<header>
<h3>✈ ECOJET RADAR PRO (REAL TIME)</h3>
<div>
<button onclick="openModal()">+ Vuelo</button>
<button onclick="clearAll()">🗑</button>
<span id="clock"></span>
</div>
</header>

<div class="container">

<div>
<table>
<thead>
<tr>
<th>Vuelo</th><th>Origen</th><th>Destino</th>
<th>ETD</th><th>ETA</th>
<th>REAL ETD</th><th>REAL ETA</th>
<th>ESTADO</th><th>ACC</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

<div class="map-container">
<div class="tabs">
<div class="tab active" onclick="tab('windy',this)">🌬️ Windy</div>
<div class="tab" onclick="tab('radar',this)">✈️ Radar</div>
</div>

<iframe id="windy" class="active"
src="https://embed.windy.com/embed2.html?lat=-16.5&lon=-64.5&zoom=5"></iframe>

<iframe id="radar"
src="https://www.flightradar24.com/-16.5,-64.5/5"></iframe>
</div>

</div>

<footer>Ecojet Radar PRO</footer>

<!-- MODAL -->
<div id="modal">
<input id="vuelo" placeholder="Vuelo"><br>
<input id="origen" placeholder="Origen"><br>
<input id="destino" placeholder="Destino"><br>
<input id="etd" placeholder="0600"><br>
<input id="eta" placeholder="0705"><br><br>
<button onclick="saveFlight()">Guardar</button>
<button onclick="closeModal()">Cerrar</button>
</div>

<script>

/* 🔥 FIREBASE CONFIG (PEGAR TU INFO) */
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  projectId: "panel-de-seguimineto",
  storageBucket: "TU_STORAGE_BUCKET",
  messagingSenderId: "TU_SENDER_ID",
  appId: "TU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const flightsRef = db.collection("flights");

/* DATA */
let flights = [];

/* REAL TIME */
flightsRef.onSnapshot(snapshot=>{
flights = [];
snapshot.forEach(doc=>{
flights.push({id:doc.id,...doc.data()});
});
render();
});

/* CLOCK */
setInterval(()=>{
let n=new Date();
document.getElementById("clock").innerText=
String(n.getUTCHours()).padStart(2,"0")+":"+
String(n.getUTCMinutes()).padStart(2,"0")+" UTC";
},1000);

/* FORMAT */
function fix(t){
if(!t)return"";
t=t.replace(":","");
return t.length===4?t.slice(0,2)+":"+t.slice(2):t;
}

/* SAVE */
function saveFlight(){
flightsRef.add({
vuelo:vuelo.value,
origen:origen.value,
destino:destino.value,
etd:fix(etd.value),
eta:fix(eta.value),
etd_real:"",
eta_real:""
});
closeModal();
}

/* UPDATE */
function setVal(id,key,value){
flightsRef.doc(id).update({
[key]:fix(value)
});
}

/* DELETE */
function del(id){
flightsRef.doc(id).delete();
}

/* RENDER */
function render(){
let tb=document.getElementById("tb");
tb.innerHTML="";

flights.forEach(f=>{
tb.innerHTML+=`
<tr>
<td>${f.vuelo}</td>
<td>${f.origen}</td>
<td>${f.destino}</td>
<td>${f.etd}</td>
<td>${f.eta}</td>

<td><input value="${f.etd_real||""}" onchange="setVal('${f.id}','etd_real',this.value)"></td>
<td><input value="${f.eta_real||""}" onchange="setVal('${f.id}','eta_real',this.value)"></td>

<td>${f.estado||"EN ESPERA"}</td>

<td><button onclick="del('${f.id}')">✖</button></td>
</tr>
`;
});
}

/* UI */
function openModal(){modal.style.display="block";}
function closeModal(){modal.style.display="none";}
function clearAll(){alert("Borra desde Firebase");}

function tab(id,el){
document.querySelectorAll("iframe").forEach(i=>i.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
}

</script>

</body>
</html>
